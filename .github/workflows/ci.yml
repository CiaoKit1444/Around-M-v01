name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Type-check & Test Suite
    runs-on: ubuntu-latest

    env:
      # Secrets must be configured in GitHub → Settings → Secrets and variables → Actions
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      BUILT_IN_FORGE_API_KEY: ${{ secrets.BUILT_IN_FORGE_API_KEY }}
      BUILT_IN_FORGE_API_URL: ${{ secrets.BUILT_IN_FORGE_API_URL }}
      VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
      OAUTH_SERVER_URL: ${{ secrets.OAUTH_SERVER_URL }}
      VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
      PEPPR_API_URL: ${{ secrets.PEPPR_API_URL }}
      STUB_SMS_FAILURE_MODE: none
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm check

      - name: Start dev server
        run: |
          pnpm dev &
          echo "DEV_SERVER_PID=$!" >> $GITHUB_ENV
          # Wait up to 60s for the server to accept connections on port 3000
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1 || \
               curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server is up after ${i}x2s"
              break
            fi
            echo "Waiting for server... attempt $i/30"
            sleep 2
          done

      - name: Run test suite
        run: pnpm test:ci

      - name: Stop dev server
        if: always()
        run: |
          if [ -n "$DEV_SERVER_PID" ]; then
            kill $DEV_SERVER_PID 2>/dev/null || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: test-results/junit.xml
          retention-days: 30
