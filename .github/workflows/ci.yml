name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Job 1: Unit Tests ─────────────────────────────────────────────────────────
  # Pure logic tests that need no live server, database, or Redis.
  # Runs fast (~30s) and always passes without any secrets.
  unit-tests:
    name: Unit Tests (no server required)
    runs-on: ubuntu-latest

    env:
      # Minimal env — unit tests only need JWT_SECRET and SSO_BRIDGE_SECRET for auth helpers
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SSO_BRIDGE_SECRET: ${{ secrets.SSO_BRIDGE_SECRET }}
      STUB_SMS_FAILURE_MODE: none
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm check

      - name: Run unit tests
        run: pnpm exec vitest run --config vitest.unit.config.ts --reporter=verbose --reporter=junit --outputFile=test-results/junit-unit.xml

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit-test-results
          path: test-results/junit-unit.xml
          retention-days: 30

  # ── Job 2: Integration Tests ──────────────────────────────────────────────────
  # Tests that require a live dev server, database, and Redis.
  # These run only on push to main/develop (not on every PR) to save CI minutes.
  integration-tests:
    name: Integration Tests (live server)
    runs-on: ubuntu-latest
    # Only run integration tests when all required secrets are available
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
    # Integration tests are informational — failures here don't block CI green status
    continue-on-error: true

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      REDIS_KEY_PREFIX: ${{ secrets.REDIS_KEY_PREFIX }}
      BUILT_IN_FORGE_API_KEY: ${{ secrets.BUILT_IN_FORGE_API_KEY }}
      BUILT_IN_FORGE_API_URL: ${{ secrets.BUILT_IN_FORGE_API_URL }}
      VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
      OAUTH_SERVER_URL: ${{ secrets.OAUTH_SERVER_URL }}
      VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
      PEPPR_API_URL: ${{ secrets.PEPPR_API_URL }}
      SSO_BRIDGE_SECRET: ${{ secrets.SSO_BRIDGE_SECRET }}
      STUB_SMS_FAILURE_MODE: none
      PORT: 3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start dev server
        run: |
          pnpm dev &
          echo "DEV_SERVER_PID=$!" >> $GITHUB_ENV
          # Wait up to 60s for the server to accept connections on port 3000
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1 || \
               curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server is up after ${i}x2s"
              break
            fi
            echo "Waiting for server... attempt $i/30"
            sleep 2
          done

      - name: Run full test suite
        run: pnpm exec vitest run --reporter=verbose --reporter=junit --outputFile=test-results/junit-integration.xml
        timeout-minutes: 10

      - name: Stop dev server
        if: always()
        run: |
          if [ -n "$DEV_SERVER_PID" ]; then
            kill $DEV_SERVER_PID 2>/dev/null || true
          fi

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration-test-results
          path: test-results/junit-integration.xml
          retention-days: 30
